<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>아기사자 관리 서비스</title>
</head>
<body>
    <h1>🦁 아기사자 관리 서비스</h1>
    <hr>
    <h2>아기사자 등록</h2>

    <form method="POST">
        {% csrf_token %}
        <p>
            이름<br>
            <input type="text" name="name" placeholder="아기사자 이름" required>
        </p>
        <p>
            트랙<br>
            <input type="text" name="track" placeholder="트랙 (예: Backend)" required>
        </p>
        <button type="submit">등록</button>
    </form>
    
    <p><a href="{% url 'lion_list' %}">목록으로</a></p>
</body>
</html>
