<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>아기사자 관리 서비스</title>
</head>
<body>
    <h1>🦁 아기사자 관리 서비스</h1>
    <hr>
    <h2>아기사자 목록</h2>

    <form method="GET">
        <input type="text" name="keyword" placeholder="이름 검색" value="{{ keyword }}">
        <button type="submit">검색</button>
    </form>

    <ul>
        {% for lion in lions %}
            <li>
                <a href="{% url 'lion_detail' lion.id %}">{{ lion.name }} ({{ lion.track }})</a>
            </li>
        {% endfor %}
    </ul>

    <hr>
    <p><a href="{% url 'lion_create' %}">아기사자 등록</a></p>
</body>
</html>
