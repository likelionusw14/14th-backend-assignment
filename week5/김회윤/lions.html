<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>아기사자 목록</title>
</head>
<body>
    <h1>아기사자 목록</h1>
    <ul>
        {% for lion in lions %}
            <li>{{ lion }}</li>
        {% empty %}
            <li>아직 등록된 아기사자가 없습니다.</li>
        {% endfor %}
    </ul>
    <a href="/lions/new">아기사자 등록</a>
</body>
</html>
