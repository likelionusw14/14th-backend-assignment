<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Segoe UI", Roboto, sans-serif;
        line-height: 1.6;
        color: #333;
        padding: 20px;
        max-width: 800px;
        margin: 0 auto;
    }

    h1 {
        font-weight: 800;
        margin-bottom: 20px;
    }

    input[type="text"] {
        padding: 5px 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
    }

    button {
        padding: 5px 15px;
        background-color: #f0f0f0;
        border: 1px solid #999;
        border-radius: 4px;
        cursor: pointer;
    }

    hr {
        border: 0;
        border-top: 1px solid #eee;
        margin: 20px 0;
    }

    a {
        color: #5d3fd3;
        text-decoration: underline;
    }
</style>

<div style="display: flex; align-items: center; gap: 10px;">
    <span style="font-size: 24px;">🦁</span>
    <h2 style="margin: 0;">아기사자 관리 서비스</h2>
</div>
<hr>

<h1>아기사자 목록</h1>
<form method="GET">
    <input type="text" name="name" placeholder="이름 검색">
    <select name="track">
        <option value="">모든 트랙</option>
        <option value="기획/디자인">기획/디자인</option>
        <option value="프론트엔드">프론트엔드</option>
        <option value="백엔드">백엔드</option>
    </select>
    <button type="submit">필터링</button>
</form>
<a href="{% url 'lions:lion_create' %}">신규 등록</a>
<ul>
    {% for lion in lions %}
    <li><a href="{% url 'lions:lion_detail' lion.pk %}">{{ lion.name }} ({{ lion.track }})</a></li>
    {% endfor %}
</ul>
